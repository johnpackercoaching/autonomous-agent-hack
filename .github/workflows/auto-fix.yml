name: Auto-Fix Pipeline

on:
  workflow_dispatch:
    inputs:
      feedback_id:
        description: "Firestore feedback document ID"
        required: true
        type: string
      feedback_text:
        description: "User feedback text"
        required: true
        type: string
      feedback_url:
        description: "URL where issue was observed"
        required: false
        type: string
        default: "/"
      mode:
        description: "Trigger mode: user-feedback or autonomous"
        required: false
        type: string
        default: "user-feedback"

concurrency:
  group: auto-fix
  cancel-in-progress: false

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Setup Firebase credentials
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/firebase-service-account.json
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Validate Claude auth
        run: claude --version
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Write feedback input
        run: |
          cat > /tmp/feedback-input.json << 'ENDJSON'
          {
            "feedback_id": "${{ inputs.feedback_id }}",
            "feedback_text": "${{ inputs.feedback_text }}",
            "feedback_url": "${{ inputs.feedback_url }}",
            "mode": "${{ inputs.mode }}"
          }
          ENDJSON

      - name: Run Claude auto-fix agent
        run: |
          claude --print \
            --system-prompt "$(cat .claude/auto-fix-prompt.md)" \
            "Read /tmp/feedback-input.json and fix the reported issue. Follow the instructions in your system prompt exactly." \
            --max-turns 30
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-service-account.json
        timeout-minutes: 20

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        id: create-pr
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix: auto-fix for feedback ${{ inputs.feedback_id }}"
          title: "Auto-Fix: ${{ inputs.feedback_text }}"
          body: |
            ## Auto-Fix

            **Feedback ID:** `${{ inputs.feedback_id }}`
            **Reported Issue:** ${{ inputs.feedback_text }}
            **URL:** ${{ inputs.feedback_url }}
            **Mode:** ${{ inputs.mode }}

            This PR was automatically generated by the auto-fix pipeline.
          branch: auto-fix/${{ inputs.feedback_id }}
          base: main
          delete-branch: true

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number
        run: gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} --auto --squash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger deploy
        if: steps.create-pr.outputs.pull-request-number
        run: |
          echo "PR created: ${{ steps.create-pr.outputs.pull-request-url }}"
          echo "Auto-merge enabled. Deploy will trigger on merge to main."

      - name: Update feedback with PR URL
        if: steps.create-pr.outputs.pull-request-url
        run: |
          node scripts/update-feedback-status.js \
            "${{ inputs.feedback_id }}" \
            "completed" \
            "Auto-fix PR created" \
            "${{ steps.create-pr.outputs.pull-request-url }}"
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-service-account.json

      - name: Handle no changes
        if: "!steps.create-pr.outputs.pull-request-number"
        run: |
          echo "No changes detected. Agent may not have found a fix."
          node scripts/update-feedback-status.js \
            "${{ inputs.feedback_id }}" \
            "failed" \
            "Auto-fix agent did not produce changes"
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-service-account.json
